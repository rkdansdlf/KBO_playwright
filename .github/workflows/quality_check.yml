name: KBO Data Quality Check

on:
  schedule:
    # Runs at 19:00 UTC which is 04:00 KST the next day.
    # This runs 1 hour after 'KBO Postgame Finalize' (daily_kbo_sync.yml).
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Quality Gate (OCI Only)
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          # Use --oci-only to check production data without needing a local SQLite setup
          python3 scripts/maintenance/quality_gate.py --oci-only

      - name: Notify Telegram on Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="❌ <b>KBO Data Quality Gate Failed</b>%0ARepo: ${{ github.repository }}%0AWorkflow: ${{ github.workflow }}%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Run Details</a>"
          
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MESSAGE}" \
              -d "parse_mode=HTML"
          else
            echo "⚠️ Telegram credentials not set, skipping notification."
          fi
