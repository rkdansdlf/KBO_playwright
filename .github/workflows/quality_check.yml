name: KBO Data Quality Check

concurrency:
  group: kbo-quality-check
  cancel-in-progress: false

on:
  schedule:
    # Runs at 19:00 UTC which is 04:00 KST the next day.
    # This runs 1 hour after 'KBO Postgame Finalize' (daily_kbo_sync.yml).
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Reference Integrity Gate (OCI Only)
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 scripts/verification/check_orphan_data.py --db-url env:OCI_DB_URL --strict --json --sample-limit 20

      - name: Run Quality Gate (OCI Only, No Artifacts)
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          # Use --oci-only to check production data without needing a local SQLite setup.
          # Use --no-write so CI does not require writable artifact directories.
          python3 scripts/maintenance/quality_gate.py --oci-only --no-write

      - name: Run Daily Completeness Audit (OCI Only)
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          # Audit the last 14 days of completed games for missing stats or relay data.
          python3 scripts/verification/audit_daily_completeness.py --db-url env:OCI_DB_URL --days 14

      - name: Run WPA Freshness Gate (OCI Only)
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          # Fails when completed games are missing WPA-backed events or review summaries.
          python3 -m src.cli.freshness_gate --days 14 --source-url-env OCI_DB_URL

      - name: Notify Telegram on Status
        if: always()
        uses: ./.github/actions/notify-telegram
        with:
          status: ${{ job.status }}
