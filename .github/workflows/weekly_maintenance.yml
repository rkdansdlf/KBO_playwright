name: KBO Weekly Maintenance

on:
  schedule:
    - cron: '0 20 * * 0'  # 월요일 05:00 KST (일 20:00 UTC)
  workflow_dispatch:
    inputs:
      profile_limit:
        description: 'Max profiles to enrich'
        required: false
        default: '500'

concurrency:
  group: kbo-db-write-operations
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-env
        with:
          playwright: 'true'
          init-db: 'true'

      - name: Run Weekly Maintenance & Sync
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          LIMIT="${{ github.event.inputs.profile_limit || '500' }}"
          python3 -m src.cli.run_weekly_maintenance \
            --profile-limit "$LIMIT" --sync

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
