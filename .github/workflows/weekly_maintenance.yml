name: KBO Weekly Maintenance

on:
  schedule:
    # Runs at 20:00 UTC on Sunday, which is 05:00 KST on Monday.
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      profile_limit:
        description: 'Max profiles to enrich'
        required: false
        default: '500'

concurrency:
  group: kbo-weekly-maintenance
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Initialize Database & Seed Metadata
        run: |
          python3 -c "from src.db.engine import init_db; init_db()"
          python3 scripts/maintenance/seed_data.py

      - name: Run Weekly Maintenance & Sync
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          LIMIT="${{ github.event.inputs.profile_limit }}"
          if [ -z "$LIMIT" ]; then LIMIT="500"; fi
          python3 -m src.cli.run_weekly_maintenance --profile-limit "$LIMIT" --sync

      - name: Notify Telegram on Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="❌ <b>KBO Weekly Maintenance Failed</b>%0ARepo: ${{ github.repository }}%0AWorkflow: ${{ github.workflow }}%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Run Details</a>"
          
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MESSAGE}" \
              -d "parse_mode=HTML"
          else
            echo "⚠️ Telegram credentials not set, skipping notification."
          fi
