name: KBO Roster Backfill

on:
  schedule:
    - cron: '0 19 1 * *'  # 매월 2일 04:00 KST (1일 19:00 UTC)
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year'
        required: false
        default: ''

concurrency:
  group: kbo-db-write-operations
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-env
        with:
          playwright: 'true'
          init-db: 'true'

      - name: Hydrate Runtime Cache From OCI
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci \
            --year "$(TZ='Asia/Seoul' date +'%Y')"

      - name: Run Roster Backfill
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          if [ -z "$YEAR" ]; then
            YEAR="$(TZ='Asia/Seoul' date +'%Y')"
          fi
          python3 -c "
          import asyncio
          from scripts.maintenance.backfill_roster_movements import (
              backfill_daily_rosters,
              backfill_player_movements,
          )
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          KST = ZoneInfo('Asia/Seoul')
          now = datetime.now(KST)
          asyncio.run(backfill_player_movements(['$YEAR']))
          end = now.strftime('%Y-%m-%d')
          start = (now - timedelta(days=7)).strftime('%Y-%m-%d')
          asyncio.run(backfill_daily_rosters(start, end))
          print(f'Roster backfill completed for {end}')
          "

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
