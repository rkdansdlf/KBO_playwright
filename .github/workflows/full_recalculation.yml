name: KBO Full Stat Recalculation

concurrency:
  group: kbo-full-recalculation
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year'
        required: true
        default: '2025'
      series:
        description: 'Series key'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - regular
          - wildcard
          - semi_playoff
          - playoff
          - korean_series
      sync:
        description: 'Sync to OCI after recalculation'
        type: boolean
        default: true

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  recalc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/kbo-job-setup
        with:
          init-db: 'true'

      - name: Run Recalculation
        run: |
          python3 -m src.cli.recalc_season_stats \
            --year ${{ github.event.inputs.year }} \
            --series ${{ github.event.inputs.series }} \
            --save

      - name: Recalc Player-Game Stats
        run: |
          python3 -m src.cli.recalc_player_game_stats \
            --season ${{ github.event.inputs.year }} \
            --save

      - name: Sync to OCI
        if: ${{ github.event.inputs.sync == 'true' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.sync_oci --season-stats --player-game-stats

      - name: Verify PlayerGame Data Quality
        if: always()
        run: |
          python3 -m scripts.verification.verify_player_game_stats --exit-code

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
