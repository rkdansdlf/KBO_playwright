name: KBO Pitcher Backfill

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      days_ahead:
        description: 'Number of days ahead to search for scheduled games'
        required: false
        default: '1'

concurrency:
  group: kbo-pitcher-backfill
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}
  OCI_DB_URL: ${{ secrets.OCI_DB_URL }}

jobs:
  backfill-pitchers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/kbo-job-setup
        id: job-setup
        with:
          playwright: 'true'
          init-db: 'true'
          resolve-date: 'true'
          date-roll: '0'

      - name: Hydrate Runtime Cache From OCI
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci \
            --year "${{ steps.job-setup.outputs.KST_YEAR }}" \
            --date "${{ steps.job-setup.outputs.KST_DATE }}"

      - name: Resolve Backfill Window
        run: |
          DAYS_AHEAD="${{ github.event.inputs.days_ahead || '1' }}"
          echo "DAYS_AHEAD=${DAYS_AHEAD}" >> "$GITHUB_ENV"

      - name: Run Pregame Backfill
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          python3 -m src.cli.backfill_pregame_previews \
            --days-ahead "${DAYS_AHEAD}"

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
