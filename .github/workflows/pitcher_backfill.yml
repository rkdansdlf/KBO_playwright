name: KBO Pitcher Backfill

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      days_ahead:
        description: 'Number of days ahead to search for scheduled games'
        required: false
        default: '1'

concurrency:
  group: kbo-pitcher-backfill
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  backfill-pitchers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python-env
        with:
          playwright: 'true'
          init-db: 'true'

      - name: Resolve Backfill Window
        run: |
          DAYS_AHEAD="${{ github.event.inputs.days_ahead || '1' }}"
          KST_DATE="$(TZ='Asia/Seoul' date +'%Y%m%d')"
          {
            echo "DAYS_AHEAD=${DAYS_AHEAD}"
            echo "KST_DATE=${KST_DATE}"
            echo "KST_YEAR=${KST_DATE:0:4}"
          } >> "$GITHUB_ENV"

      - name: Hydrate Runtime Cache From OCI
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci \
            --year "${KST_YEAR}" --date "${KST_DATE}"

      - name: Run Pregame Backfill
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          python3 -m src.cli.backfill_pregame_previews \
            --days-ahead "${DAYS_AHEAD}"

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
