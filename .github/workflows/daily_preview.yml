name: KBO Pregame Refresh

on:
  schedule:
    # Every 15 minutes from 10:00 to 19:45 KST.
    - cron: '*/15 1-10 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date to refresh preview data (YYYYMMDD). Defaults to today in KST.'
        required: false
        default: ''

concurrency:
  group: kbo-pregame-refresh
  cancel-in-progress: false

jobs:
  pregame-refresh:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Get current date in KST
        id: date
        run: |
          if [ "${{ github.event.inputs.target_date }}" != "" ]; then
            KST_DATE="${{ github.event.inputs.target_date }}"
          else
            KST_DATE="$(TZ='Asia/Seoul' date +'%Y%m%d')"
          fi
          echo "KST_DATE=${KST_DATE}" >> $GITHUB_ENV
          echo "KST_YEAR=${KST_DATE:0:4}" >> $GITHUB_ENV

      - name: Initialize Database & Seed Metadata
        run: |
          python3 -c "from src.db.engine import init_db; init_db()"
          python3 scripts/maintenance/seed_data.py

      - name: Hydrate Runtime Cache From OCI
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci --year "${{ env.KST_YEAR }}" --date "${{ env.KST_DATE }}"

      - name: Run Daily Preview Batch
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
          AUTO_SYNC_OCI: 'false'
        run: |
          echo "Refreshing pregame context for ${KST_DATE}..."
          python3 -m src.cli.daily_preview_batch --date ${{ env.KST_DATE }}
