name: KBO Pregame Refresh

on:
  schedule:
    - cron: '*/15 7-9 * * 2-5'
    - cron: '30,45 5 * * 6'
    - cron: '*/15 6-8 * * 6'
    - cron: '30,45 2 * * 0'
    - cron: '*/15 3-8 * * 0'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYYMMDD). Defaults to today in KST.'
        required: false
        default: ''

concurrency:
  group: kbo-pregame-refresh
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}
  OCI_DB_URL: ${{ secrets.OCI_DB_URL }}

jobs:
  pregame-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/kbo-job-setup
        id: job-setup
        with:
          playwright: 'true'
          init-db: 'true'
          resolve-date: 'true'
          target-date: ${{ github.event.inputs.target_date || '' }}
          date-roll: '0'

      - name: Hydrate Runtime Cache From OCI
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci \
            --year "${{ steps.job-setup.outputs.KST_YEAR }}" \
            --date "${{ steps.job-setup.outputs.KST_DATE }}"

      - name: Run Daily Preview Batch
        env:
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          python3 -m src.cli.daily_preview_batch --date "${{ steps.job-setup.outputs.KST_DATE }}"

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
