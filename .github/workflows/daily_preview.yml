name: KBO Pregame Refresh

on:
  schedule:
    - cron: '*/15 7-9 * * 2-5'
    - cron: '30,45 5 * * 6'
    - cron: '*/15 6-8 * * 6'
    - cron: '30,45 2 * * 0'
    - cron: '*/15 3-8 * * 0'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYYMMDD). Defaults to today in KST.'
        required: false
        default: ''

concurrency:
  group: kbo-pregame-refresh
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  pregame-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python-env
        with:
          playwright: 'true'
          init-db: 'true'

      - name: Get current date in KST
        id: date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            KST_DATE="${{ github.event.inputs.target_date }}"
          else
            KST_DATE="$(TZ='Asia/Seoul' date +'%Y%m%d')"
          fi
          echo "KST_DATE=${KST_DATE}" >> $GITHUB_ENV
          echo "KST_YEAR=${KST_DATE:0:4}" >> $GITHUB_ENV

      - name: Hydrate Runtime Cache From OCI
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci \
            --year "${{ env.KST_YEAR }}" --date "${{ env.KST_DATE }}"

      - name: Run Daily Preview Batch
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          python3 -m src.cli.daily_preview_batch --date ${{ env.KST_DATE }}

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
