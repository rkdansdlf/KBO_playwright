name: KBO Player ID Backfill

on:
  schedule:
    - cron: '30 20 * * 3'  # 목요일 05:30 KST (수 20:30 UTC)
  workflow_dispatch:

concurrency:
  group: kbo-db-write-operations
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python-env
        with:
          init-db: 'true'

      - name: Run Player ID Backfill
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -c "
          from scripts.legacy.maintenance.backfill_player_ids import backfill_year
          from src.db.engine import SessionLocal
          from src.services.player_id_resolver import PlayerIdResolver
          year = $(TZ='Asia/Seoul' date +'%Y')
          with SessionLocal() as session:
              resolver = PlayerIdResolver(session)
              result = backfill_year(session, resolver, year)
              print(f'Player ID backfill: resolved={result.get(\"resolved\", 0)} failed={result.get(\"failed\", 0)}')
          "

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
