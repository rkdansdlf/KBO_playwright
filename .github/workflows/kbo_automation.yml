name: KBO Data Automation

on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase to execute'
        type: choice
        required: true
        default: 'finalize'
        options:
          - pregame
          - live
          - finalize
          - freshness
      target_date:
        description: 'Target date (YYYYMMDD). Defaults to today in KST for pregame/live, previous day for finalize/freshness.'
        required: false
        default: ''

jobs:
  run-phase:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Resolve Target Date
      id: target
      run: |
        if [ "${{ github.event.inputs.target_date }}" != "" ]; then
          echo "TARGET_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.inputs.phase }}" = "finalize" ] || [ "${{ github.event.inputs.phase }}" = "freshness" ]; then
          echo "TARGET_DATE=$(TZ='Asia/Seoul' date -d 'yesterday' +'%Y%m%d')" >> $GITHUB_OUTPUT
        else
          echo "TARGET_DATE=$(TZ='Asia/Seoul' date +'%Y%m%d')" >> $GITHUB_OUTPUT
        fi

    - name: Initialize Database & Seed Metadata
      run: |
        python3 -c "from src.db.engine import init_db; init_db()"
        python3 scripts/maintenance/seed_data.py

    - name: Hydrate Runtime Cache From OCI
      if: ${{ github.event.inputs.phase != 'live' }}
      env:
        OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
      run: |
        TARGET_DATE="${{ steps.target.outputs.TARGET_DATE }}"
        python3 -m src.cli.hydrate_runtime_from_oci --year "${TARGET_DATE:0:4}" --date "${TARGET_DATE}"

    - name: Run Requested Phase
      env:
        OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
        KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        AUTO_SYNC_OCI: 'false'
      run: |
        echo "Running phase=${{ github.event.inputs.phase }} target_date=${{ steps.target.outputs.TARGET_DATE }}"
        case "${{ github.event.inputs.phase }}" in
          pregame)
            python3 -m src.cli.daily_preview_batch --date "${{ steps.target.outputs.TARGET_DATE }}"
            ;;
          live)
            python3 -m src.cli.live_crawler --run-once
            ;;
          finalize)
            python3 -m src.cli.run_daily_update --date "${{ steps.target.outputs.TARGET_DATE }}" --sync
            ;;
          freshness)
            python3 -m src.cli.freshness_gate --date "${{ steps.target.outputs.TARGET_DATE }}"
            ;;
          *)
            echo "Unsupported phase: ${{ github.event.inputs.phase }}"
            exit 1
            ;;
        esac
