name: KBO Backfill (Consolidated)

on:
  schedule:
    - cron: '30 19 * * 0'  # Mon 04:30 KST — missed_crawls
    - cron: '0 19 * * 0'   # Mon 04:00 KST — player_game_stats
    - cron: '45 20 * * 0'  # Mon 05:45 KST — sh_sf
    - cron: '0 21 * * 0'   # Mon 06:00 KST — advanced_stats
    - cron: '0 20 * * 0'   # Mon 05:00 KST — player_profiles
    - cron: '30 20 * * 3'  # Thu 05:30 KST — player_ids
    - cron: '0 19 1 * *'   # 2nd 04:00 KST — roster
  workflow_dispatch:
    inputs:
      backfill_id:
        description: 'Which backfill to run (missed_crawls|player_game_stats|sh_sf|advanced_stats|player_profiles|player_ids|roster|all)'
        required: false
        default: 'all'
      year:
        description: 'Season year (leave empty for current)'
        required: false
        default: ''
      lookback_days:
        description: 'Lookback days for missed_crawls backfill'
        required: false
        default: '14'

concurrency:
  group: kbo-db-write-operations
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}
  BACKFILL_DEFINITIONS: >-
    [
      {"id":"missed_crawls","name":"Missed Crawls","cron":"30 19 * * 0","playwright":"true","hydrate":"true","secrets_group":"kbo_auth"},
      {"id":"player_game_stats","name":"Player Game Stats","cron":"0 19 * * 0","playwright":"false","hydrate":"false","secrets_group":"none"},
      {"id":"sh_sf","name":"SH/SF","cron":"45 20 * * 0","playwright":"false","hydrate":"false","secrets_group":"none"},
      {"id":"advanced_stats","name":"Advanced Stats","cron":"0 21 * * 0","playwright":"false","hydrate":"true","secrets_group":"none"},
      {"id":"player_profiles","name":"Player Profiles","cron":"0 20 * * 0","playwright":"true","hydrate":"true","secrets_group":"none"},
      {"id":"player_ids","name":"Player IDs","cron":"30 20 * * 3","playwright":"false","hydrate":"false","secrets_group":"none"},
      {"id":"roster","name":"Roster","cron":"0 19 1 * *","playwright":"true","hydrate":"true","secrets_group":"kbo_auth"}
    ]

jobs:
  select-backfills:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      count: ${{ steps.select.outputs.count }}
    steps:
      - name: Select backfill matrix entries
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
          BACKFILL_ID: ${{ github.event.inputs.backfill_id || 'all' }}
        run: |
          python3 - <<'PY'
          import json
          import os

          definitions = json.loads(os.environ["BACKFILL_DEFINITIONS"])
          event_name = os.environ["EVENT_NAME"]
          event_schedule = os.environ["EVENT_SCHEDULE"]
          backfill_id = os.environ["BACKFILL_ID"] or "all"

          if event_name == "workflow_dispatch":
              if backfill_id == "all":
                  selected = definitions
              else:
                  selected = [entry for entry in definitions if entry["id"] == backfill_id]
          elif event_name == "schedule":
              selected = [entry for entry in definitions if entry["cron"] == event_schedule]
          else:
              selected = []

          matrix = json.dumps({"include": selected}, separators=(",", ":"))
          count = str(len(selected))
          selected_ids = ", ".join(entry["id"] for entry in selected) or "none"

          print(f"Selected backfill entries: {selected_ids}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={matrix}\n")
              output.write(f"count={count}\n")
          PY

  backfill:
    needs: select-backfills
    if: ${{ needs.select-backfills.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select-backfills.outputs.matrix) }}

    name: ${{ matrix.name }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/kbo-job-setup
        with:
          playwright: ${{ matrix.playwright }}
          init-db: 'true'

      - name: Resolve Year
        id: params
        run: |
          YEAR="${{ github.event.inputs.year || '' }}"
          if [ -z "$YEAR" ]; then
            YEAR="$(TZ='Asia/Seoul' date +'%Y')"
          fi
          echo "year=${YEAR}" >> "$GITHUB_OUTPUT"
          echo "date=$(TZ='Asia/Seoul' date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Hydrate Runtime Cache From OCI
        if: ${{ matrix.hydrate == 'true' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci \
            --year "${{ steps.params.outputs.year }}"

      # ── missed_crawls ────────────────────────────────────────────────
      - name: Run Missed Crawls Backfill
        if: ${{ matrix.id == 'missed_crawls' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          python3 -c "
          from scripts.scheduler import backfill_missed_daily_crawls
          result = backfill_missed_daily_crawls(lookback_days=${{ github.event.inputs.lookback_days || '14' }})
          print(f'Backfilled: {result}')
          "

      # ── player_game_stats ────────────────────────────────────────────
      - name: Recalc & Sync Player Game Stats
        if: ${{ matrix.id == 'player_game_stats' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          YEAR="${{ steps.params.outputs.year }}"
          for year in $(seq 2018 "$YEAR"); do
            echo "=== Processing $year ==="
            python3 -m src.cli.recalc_player_game_stats --season "$year" --save
          done
          echo "=== Syncing all to OCI ==="
          python3 -m src.cli.sync_oci --player-game-stats

      - name: Verify PlayerGame Data Quality
        if: ${{ matrix.id == 'player_game_stats' }}
        run: |
          python3 -m scripts.verification.verify_player_game_stats --exit-code

      # ── sh_sf ────────────────────────────────────────────────────────
      - name: Run SH/SF Backfill
        if: ${{ matrix.id == 'sh_sf' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          YEAR="${{ steps.params.outputs.year }}"
          python3 -c "
          from scripts.maintenance.backfill_sh_sf_from_pbp import find_candidate_games, backfill_game
          from src.db.engine import SessionLocal
          year = ${YEAR}
          with SessionLocal() as session:
              game_ids = find_candidate_games(session, year=year)
              if not game_ids:
                  print('No candidate games found')
              else:
                  total = 0
                  for gid in game_ids:
                      updated = backfill_game(session, gid)
                      if updated:
                          session.commit()
                          total += updated
                  print(f'SH/SF backfill: {len(game_ids)} games updated ({total} rows)')
          "

      # ── advanced_stats ───────────────────────────────────────────────
      - name: Run Advanced Stats Backfill
        if: ${{ matrix.id == 'advanced_stats' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          YEAR="${{ steps.params.outputs.year }}"
          python3 -m src.cli.backfill_advanced_stats \
            --years "$YEAR" \
            --series regular
          python3 -m src.cli.sync_oci \
            --season-stats \
            --year "$YEAR"

      # ── player_profiles ─────────────────────────────────────────────
      - name: Run Player Profile Backfill
        if: ${{ matrix.id == 'player_profiles' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 scripts/backfill_player_profiles.py --limit 0 --delay 1.5
          python3 -m src.cli.sync_oci --player-basic

      # ── player_ids ──────────────────────────────────────────────────
      - name: Run Player ID Backfill
        if: ${{ matrix.id == 'player_ids' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          YEAR="${{ steps.params.outputs.year }}"
          python3 -m scripts.maintenance.resolve_null_player_ids_conservative \
            --oci \
            --years "$YEAR" \
            --apply \
            --no-backup \
            --delete-duplicates

      # ── roster ──────────────────────────────────────────────────────
      - name: Run Roster Backfill
        if: ${{ matrix.id == 'roster' }}
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          YEAR="${{ steps.params.outputs.year }}"
          python3 -c "
          import asyncio
          from scripts.maintenance.backfill_roster_movements import (
              backfill_daily_rosters,
              backfill_player_movements,
          )
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          KST = ZoneInfo('Asia/Seoul')
          now = datetime.now(KST)
          asyncio.run(backfill_player_movements(['${YEAR}']))
          end = now.strftime('%Y-%m-%d')
          start = (now - timedelta(days=7)).strftime('%Y-%m-%d')
          asyncio.run(backfill_daily_rosters(start, end))
          print(f'Roster backfill completed for {end}')
          "

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          workflow: ${{ format('Backfill ({0})', matrix.name) }}
          channels: telegram
