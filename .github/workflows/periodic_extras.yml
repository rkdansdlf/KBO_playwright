name: KBO Periodic Extras

on:
  schedule:
    - cron: '0 21 1 * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year for futures stats'
        required: false
        default: ''

concurrency:
  group: kbo-periodic-extras
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  extras:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-env
        with:
          playwright: 'true'
          init-db: 'true'

      - name: Run Periodic Extras & Sync
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          if [ -z "$YEAR" ]; then
            YEAR="$(TZ='Asia/Seoul' date +'%Y')"
          fi
          python3 -m src.cli.run_periodic_extras --year "$YEAR" --sync

      - name: PA Formula Monthly Audit
        run: |
          YEAR="$(TZ='Asia/Seoul' date +'%Y')"
          PREV_YEAR=$(( YEAR - 1 ))
          python3 -m src.cli.monthly_pa_audit --year "$PREV_YEAR"
          python3 -m src.cli.monthly_pa_audit --year "$YEAR"

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
