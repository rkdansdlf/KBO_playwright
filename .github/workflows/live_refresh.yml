name: KBO Live Refresh

on:
  schedule:
    - cron: '*/5 9-13 * * 2-5'
    - cron: '0-30/5 14 * * 2-5'
    - cron: '30-59/5 7 * * 6'
    - cron: '*/5 8-12 * * 6'
    - cron: '0-30/5 13 * * 6'
    - cron: '30-59/5 4 * * 0'
    - cron: '*/5 5-12 * * 0'
    - cron: '0-30/5 13 * * 0'
  workflow_dispatch:

concurrency:
  group: kbo-live-refresh
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  live-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: ./.github/actions/python-env
        with:
          playwright: 'true'
          init-db: 'true'

      - name: Run Live Refresh Cycle
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.live_crawler --run-once

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
