name: KBO Postgame Finalize

on:
  schedule:
    # Runs at 18:00 UTC which is 03:00 KST the next day.
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date to finalize (YYYYMMDD). Defaults to previous day in KST.'
        required: false
        default: ''

concurrency:
  group: kbo-postgame-finalize
  cancel-in-progress: false

jobs:
  postgame-finalize:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Resolve target date in KST
        id: date
        run: |
          if [ "${{ github.event.inputs.target_date }}" != "" ]; then
            KST_DATE="${{ github.event.inputs.target_date }}"
          else
            KST_DATE="$(TZ='Asia/Seoul' date -d 'yesterday' +'%Y%m%d')"
          fi
          echo "KST_DATE=${KST_DATE}" >> $GITHUB_ENV
          echo "KST_YEAR=${KST_DATE:0:4}" >> $GITHUB_ENV

      - name: Initialize Database & Seed Metadata
        run: |
          # Ensure SQLite schemas and static FK references (Teams/Seasons) exist
          python3 -c "from src.db.engine import init_db; init_db()"
          python3 scripts/maintenance/seed_data.py

      - name: Hydrate Runtime Cache From OCI
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci --year "${{ env.KST_YEAR }}" --date "${{ env.KST_DATE }}"

      - name: Run Postgame Finalize & Sync
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          AUTO_SYNC_OCI: 'false'
        run: |
          python3 -m src.cli.run_daily_update --date ${{ env.KST_DATE }} --sync
