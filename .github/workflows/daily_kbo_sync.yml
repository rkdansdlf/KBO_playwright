name: KBO Daily Pipeline

on:
  schedule:
    - cron: '0 18 * * *'  # 03:00 KST
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYYMMDD or YYYY-MM-DD). Defaults to previous day in KST.'
        required: false
        default: ''

concurrency:
  group: kbo-db-write-operations
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}
  OCI_DB_URL: ${{ secrets.OCI_DB_URL }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Postgame Finalize (03:00 KST) + Standings + Defense + Rankings
  # ──────────────────────────────────────────────────────────────────────────
  finalize:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.job-setup.outputs.KST_DATE }}
      year: ${{ steps.job-setup.outputs.KST_YEAR }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/kbo-job-setup
        id: job-setup
        with:
          playwright: 'true'
          init-db: 'true'
          resolve-date: 'true'
          target-date: ${{ github.event.inputs.target_date || '' }}

      - name: Hydrate Runtime Cache From OCI
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci \
            --year "${{ steps.job-setup.outputs.KST_YEAR }}" \
            --date "${{ steps.job-setup.outputs.KST_DATE }}"

      - name: Verify target-date game completeness before publish (local, preflight)
        id: preflight_local
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          python3 scripts/verification/audit_daily_completeness.py \
            --date "${{ steps.job-setup.outputs.KST_DATE }}" \
            --include-incomplete \
            --strict

      - name: Verify target-date game completeness before publish (OCI, preflight)
        id: preflight_oci
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 scripts/verification/audit_daily_completeness.py \
            --date "${{ steps.job-setup.outputs.KST_DATE }}" \
            --include-incomplete \
            --strict \
            --db-url env:OCI_DB_URL

      - name: Run Postgame Finalize & Sync
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          python3 -m src.cli.run_daily_update \
            --date ${{ steps.job-setup.outputs.KST_DATE }} \
            --sync --fix

      - name: Verify target-date game completeness after publish (local, post-sync)
        id: postsync_local
        run: |
          python3 scripts/verification/audit_daily_completeness.py \
            --date "${{ steps.job-setup.outputs.KST_DATE }}" \
            --include-incomplete \
            --strict

      - name: Verify target-date game completeness after publish (OCI, post-sync)
        id: postsync_oci
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 scripts/verification/audit_daily_completeness.py \
            --date "${{ steps.job-setup.outputs.KST_DATE }}" \
            --include-incomplete \
            --strict \
            --db-url env:OCI_DB_URL

      - name: Compute Standings
        run: |
          python3 -m src.cli.calculate_standings \
            --year ${{ steps.job-setup.outputs.KST_YEAR }}

      - name: Aggregate Team Defense
        run: |
          python3 -c "
          from src.aggregators.team_fielding_aggregator import TeamFieldingAggregator
          from src.db.engine import SessionLocal
          from src.models.team import Team
          year = ${{ steps.job-setup.outputs.KST_YEAR }}
          with SessionLocal() as session:
              teams = [t.team_id for t in session.query(Team.team_id).filter(Team.is_active).all()]
              TeamFieldingAggregator(session).run_all(year, teams)
          "

      - name: Compute Rankings
        run: |
          python3 -m src.cli.calculate_rankings \
            --year ${{ steps.job-setup.outputs.KST_YEAR }}

      - name: OCI Freshness Gate
        continue-on-error: true
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.freshness_gate \
            --date ${{ steps.job-setup.outputs.KST_DATE }} \
            --source-url-env OCI_DB_URL

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          workflow: 'Postgame Finalize'
          channels: telegram

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — PBP Healer + Batch Parse (04:30-05:00 KST)
  # ──────────────────────────────────────────────────────────────────────────
  post-process:
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/kbo-job-setup
        with:
          playwright: 'true'
          init-db: 'true'
          hydrate: 'true'
          hydrate-year: ${{ needs.finalize.outputs.year }}
          hydrate-date: ${{ needs.finalize.outputs.date }}

      - name: Heal Unverified PBP
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.auto_healer --lookback-days 3

      - name: Batch Parse Snapshots
        run: |
          python3 scripts/batch_parse_snapshots.py

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          workflow: 'PBP Healer & Batch Parse'
          channels: telegram

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Quality Report + Gap Report (05:15-05:30 KST)
  # ──────────────────────────────────────────────────────────────────────────
  quality:
    needs: [finalize, post-process]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/kbo-job-setup
        with:
          init-db: 'true'
          hydrate: 'true'
          hydrate-year: ${{ needs.finalize.outputs.year }}
          hydrate-date: ${{ needs.finalize.outputs.date }}

      - name: Generate Quality Report
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.generate_quality_report \
            --date ${{ needs.finalize.outputs.date }} \
            --force-notify

      - name: Quality Dashboard
        run: |
          python3 -m src.cli.quality_dashboard --limit 14 --json

      - name: Trend Tracker Check
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -c "
          from src.monitoring.trend_tracker import TrendTracker
          TrendTracker().send_degradation_alert(days=14)
          "

      - name: Run Gap Report
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_RELAY: ${{ secrets.TELEGRAM_CHAT_ID_RELAY || secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_STANDINGS: ${{ secrets.TELEGRAM_CHAT_ID_STANDINGS || secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_PROFILE: ${{ secrets.TELEGRAM_CHAT_ID_PROFILE || secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_FRESHNESS: ${{ secrets.TELEGRAM_CHAT_ID_FRESHNESS || secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -m src.cli.gap_report

      - name: Data Freshness Monitor
        run: |
          python3 -m src.cli.monitor_data_freshness

      - name: Recalc Player-Game Stats
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.recalc_player_game_stats \
            --date ${{ needs.finalize.outputs.date }} \
            --save
          python3 -m src.cli.sync_oci \
            --player-game-stats \
            --year ${{ needs.finalize.outputs.year }}

      - name: Verify PlayerGame Data Quality
        run: |
          python3 -m scripts.verification.verify_player_game_stats \
            --date ${{ needs.finalize.outputs.date }} \
            --exit-code

      - name: Comprehensive Data Integrity Audit (full_audit)
        continue-on-error: true
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m scripts.maintenance.full_audit \
            --json --no-write --db-url "$OCI_DB_URL"

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          workflow: 'Quality & Gap Report'
          channels: telegram

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Advanced Daily Sync
  # ──────────────────────────────────────────────────────────────────────────
  advanced-sync:
    needs: [finalize, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/kbo-job-setup
        with:
          playwright: 'true'
          init-db: 'true'
          hydrate: 'true'
          hydrate-year: ${{ needs.finalize.outputs.year }}
          hydrate-date: ${{ needs.finalize.outputs.date }}

      - name: Run Advanced Daily & Sync
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.run_advanced_daily \
            --year ${{ needs.finalize.outputs.year }} \
            --sync

      - name: Resolve Null Player IDs (OCI)
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m scripts.maintenance.resolve_null_player_ids_conservative \
            --oci \
            --years ${{ needs.finalize.outputs.year }} \
            --apply \
            --no-backup \
            --delete-duplicates

      - name: Reference Integrity Gate
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 scripts/verification/check_orphan_data.py \
            --db-url env:OCI_DB_URL --strict --json --sample-limit 20

      - name: Quality Gate (OCI Only)
        continue-on-error: true
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m scripts.maintenance.quality_gate --oci-only --no-write

      - name: Completeness Audit
        if: always()
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 scripts/verification/audit_daily_completeness.py \
            --db-url env:OCI_DB_URL --days 14

      - name: Freshness Gate (Extended Window)
        if: always()
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.freshness_gate \
            --days 14 --source-url-env OCI_DB_URL

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
