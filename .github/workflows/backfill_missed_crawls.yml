name: KBO Backfill Missed Crawls

on:
  schedule:
    - cron: '30 19 * * 0'  # 월요일 04:30 KST (일 19:30 UTC)
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back'
        required: false
        default: '14'
      target_date:
        description: 'Specific date to backfill (YYYYMMDD)'
        required: false
        default: ''

concurrency:
  group: kbo-db-write-operations
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-env
        with:
          playwright: 'true'
          init-db: 'true'

      - name: Resolve target window
        id: params
        run: |
          echo "LOOKBACK=${{ github.event.inputs.lookback_days || '14' }}" >> $GITHUB_OUTPUT

      - name: Hydrate Runtime Cache From OCI
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          python3 -m src.cli.hydrate_runtime_from_oci \
            --year "$(TZ='Asia/Seoul' date +'%Y')"

      - name: Run Backfill Missed Daily Crawls
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
          KBO_USER_ID: ${{ secrets.KBO_USER_ID }}
          KBO_USER_PWD: ${{ secrets.KBO_USER_PWD }}
        run: |
          python3 -c "
          from scripts.scheduler import backfill_missed_daily_crawls
          result = backfill_missed_daily_crawls(lookback_days=${{ steps.params.outputs.LOOKBACK }})
          print(f'Backfilled: {result}')
          "

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
