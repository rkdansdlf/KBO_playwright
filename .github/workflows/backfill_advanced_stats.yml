name: KBO Advanced Stats Backfill

on:
  schedule:
    - cron: '0 21 * * 0'  # 월요일 06:00 KST (일 21:00 UTC)
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year'
        required: false
        default: ''

concurrency:
  group: kbo-db-write-operations
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-env
        with:
          init-db: 'true'

      - name: Run Advanced Stats Backfill
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          if [ -z "$YEAR" ]; then
            YEAR="$(TZ='Asia/Seoul' date +'%Y')"
          fi
          python3 -m src.cli.backfill_advanced_stats "$YEAR" regular

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
