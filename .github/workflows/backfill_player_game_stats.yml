name: KBO Player Game Stats Backfill

on:
  schedule:
    - cron: '0 19 * * 0'  # 월요일 04:00 KST (일 19:00 UTC)
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year (leave empty for all years 2018~current)'
        required: false
        default: ''

concurrency:
  group: kbo-db-write-operations
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-env
        with:
          init-db: 'true'

      - name: Recalc & Sync Player Game Stats
        env:
          OCI_DB_URL: ${{ secrets.OCI_DB_URL }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          if [ -n "$YEAR" ]; then
            echo "=== Recalc $YEAR ==="
            python3 -m src.cli.recalc_player_game_stats --season "$YEAR" --save
          else
            CURRENT="$(TZ='Asia/Seoul' date +'%Y')"
            for year in $(seq 2018 "$CURRENT"); do
              echo "=== Processing $year ==="
              python3 -m src.cli.recalc_player_game_stats --season "$year" --save
            done
          fi
          echo "=== Syncing all to OCI ==="
          python3 -m src.cli.sync_oci --player-game-stats

      - name: Verify PlayerGame Data Quality
        run: |
          python3 -m scripts.verification.verify_player_game_stats --exit-code

      - uses: ./.github/actions/notify
        if: always()
        with:
          status: ${{ job.status }}
          channels: telegram
