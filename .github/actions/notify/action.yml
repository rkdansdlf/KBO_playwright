name: 'Notify'
description: 'Send workflow status notification to Telegram and/or Slack'
inputs:
  status:
    description: 'Job status (success/failure/cancelled)'
    required: true
  workflow:
    description: 'Workflow name (defaults to github.workflow)'
    required: false
    default: ''
  channels:
    description: 'Comma-separated list of channels (telegram, slack, both)'
    required: false
    default: 'telegram'

runs:
  using: 'composite'
  steps:
    - name: Send Telegram notification
      if: ${{ contains(inputs.channels, 'telegram') || inputs.channels == 'both' }}
      shell: bash
      env:
        TELEGRAM_BOT_TOKEN: ${{ env.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ env.TELEGRAM_CHAT_ID }}
      run: |
        STATUS_INPUT="${{ inputs.status }}"
        WF_NAME="${{ inputs.workflow }}"
        if [ -z "$WF_NAME" ]; then
          WF_NAME="${{ github.workflow }}"
        fi

        case "$STATUS_INPUT" in
          success) EMOJI="✅"; STATUS="Success" ;;
          failure) EMOJI="❌"; STATUS="Failure" ;;
          cancelled) EMOJI="⚠️"; STATUS="Cancelled" ;;
          *) EMOJI="❓"; STATUS="$STATUS_INPUT" ;;
        esac

        MESSAGE="${EMOJI} <b>KBO ${WF_NAME} ${STATUS}</b>%0ARepo: ${{ github.repository }}%0ARun: <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Details</a>"

        if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || echo "Telegram notification failed"
        else
          echo "Telegram credentials not set, skipping."
        fi

    - name: Send Slack notification
      if: ${{ contains(inputs.channels, 'slack') || inputs.channels == 'both' }}
      shell: bash
      env:
        SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
        STATUS_INPUT: ${{ inputs.status }}
        WORKFLOW_NAME: ${{ inputs.workflow || github.workflow }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
      run: |
        python3 <<'PY'
        import json
        import os
        import urllib.request

        status = os.environ.get("STATUS_INPUT", "")
        workflow = os.environ.get("WORKFLOW_NAME", "")
        repository = os.environ.get("GITHUB_REPOSITORY_NAME", "")
        run_id = os.environ.get("GITHUB_RUN_ID_VALUE", "")
        emoji, label = {
            "success": ("✅", "Success"),
            "failure": ("❌", "Failure"),
            "cancelled": ("⚠️", "Cancelled"),
        }.get(status, ("❓", status))
        color = "good" if status == "success" else "danger"
        payload = {
            "text": f"{emoji} KBO {workflow} {label}",
            "attachments": [
                {
                    "color": color,
                    "fields": [
                        {"title": "Repository", "value": repository, "short": True},
                        {
                            "title": "Run",
                            "value": f"<https://github.com/{repository}/actions/runs/{run_id}|View Details>",
                            "short": True,
                        },
                    ],
                }
            ],
        }

        url = os.environ.get("SLACK_WEBHOOK_URL")
        if url:
            req = urllib.request.Request(
                url,
                data=json.dumps(payload).encode(),
                headers={"Content-Type": "application/json"},
            )
            urllib.request.urlopen(req)
            print("Slack notification sent")
        else:
            print("Slack webhook URL not set, skipping.")
        PY
