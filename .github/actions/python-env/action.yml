name: 'KBO Python Env'
description: 'Setup Python, install deps, init DB, hydrate from OCI'
inputs:
  python-version:
    description: 'Python version'
    required: false
    default: '3.12'
  playwright:
    description: 'Install Playwright browser'
    required: false
    default: 'false'
  init-db:
    description: 'Initialize database and seed metadata'
    required: false
    default: 'false'
  hydrate:
    description: 'Hydrate runtime cache from OCI'
    required: false
    default: 'false'
  hydrate-year:
    description: 'Year for OCI hydration'
    required: false
    default: ''
  hydrate-date:
    description: 'Date for OCI hydration (YYYYMMDD)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install dependencies
      shell: bash
      run: pip install -r requirements.txt

    - name: Cache Playwright browsers
      id: cache-playwright
      if: ${{ inputs.playwright == 'true' }}
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ hashFiles('requirements.txt') }}

    - name: Install Playwright
      if: ${{ inputs.playwright == 'true' }}
      shell: bash
      run: |
        if [ "${{ steps.cache-playwright.outputs.cache-hit }}" == "true" ]; then
          playwright install-deps chromium
        else
          playwright install --with-deps chromium
        fi

    - name: Initialize Database & Seed Metadata
      if: ${{ inputs.init-db == 'true' }}
      shell: bash
      run: |
        python3 -c "from src.db.engine import init_db; init_db()"
        python3 -m scripts.maintenance.seed_data

    - name: Hydrate Runtime Cache From OCI
      if: ${{ inputs.hydrate == 'true' }}
      shell: bash
      env:
        OCI_DB_URL: ${{ env.OCI_DB_URL }}
      run: |
        YEAR="${{ inputs.hydrate-year }}"
        DATE="${{ inputs.hydrate-date }}"
        if [ -z "$YEAR" ] && [ -n "$DATE" ]; then
          YEAR="${DATE:0:4}"
        fi
        if [ -n "$YEAR" ] && [ -n "$DATE" ]; then
          python3 -m src.cli.hydrate_runtime_from_oci --year "$YEAR" --date "$DATE"
        elif [ -n "$YEAR" ]; then
          python3 -m src.cli.hydrate_runtime_from_oci --year "$YEAR"
        else
          echo "Skipping hydration: no year or date provided"
        fi
