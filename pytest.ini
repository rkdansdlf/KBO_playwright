[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    integration: integration-style tests that may touch broader crawler or aggregation paths.
    asyncio: run test in asyncio event loop
    slow: tests that require a live browser or real HTTP requests (skipped by default).
    oci: tests that require an OCI database connection.
# Cap xdist workers because SQLite/ORM setup contention makes larger local worker
# pools slower and can leave the full suite waiting on a worker teardown.
addopts = -m "not slow and not integration" -n 2
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SADeprecationWarning
    ignore:Using `httpx` with `starlette.testclient` is deprecated:DeprecationWarning
