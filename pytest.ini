[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    integration: integration-style tests that may touch broader crawler or aggregation paths.
    asyncio: run test in asyncio event loop
    slow: tests that require a live browser or real HTTP requests (skipped by default).
    oci: tests that require an OCI database connection.
addopts = -m "not slow and not integration" -n auto
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SADeprecationWarning
    ignore:Using `httpx` with `starlette.testclient` is deprecated:starlette.exceptions.StarletteDeprecationWarning
