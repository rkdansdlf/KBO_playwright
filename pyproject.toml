[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.coverage.run]
branch = true
source = ["src"]
omit = [
    "src/cli/api_server.py",
    "src/cli/run_daily_update.py",
    "src/utils/metrics.py",
    "src/utils/sentry.py",
]

[tool.coverage.report]
fail_under = 75
show_missing = true
skip_empty = true
exclude_also = [
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
    "pragma: no cover",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-m 'not integration' -n auto"
markers = [
    "slow: marks tests as slow-running (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests requiring external services",
    "oci: requires OCI database connection",
]

[tool.mypy]
python_version = "3.12"
plugins = ["sqlalchemy.ext.mypy.plugin"]
warn_unused_ignores = true
ignore_missing_imports = true
files = [
    "src/models/", "src/utils/", "src/db/", "src/parsers/", "src/sources/",
    "src/analyzers/", "src/monitoring/", "src/validators/", "src/sync/",
    "src/aggregators/", "src/services/", "src/repositories/", "src/cli/",
    "scripts/maintenance/", "scripts/verification/", "scripts/diagnostic/",
    "scripts/scheduler.py", "scripts/batch_parse_snapshots.py",
    "scripts/hydrate_from_oci.py", "scripts/sync_from_oci.py",
    "scripts/sync_metadata_to_oci.py", "scripts/sync_new_games_to_oci.py",
    "scripts/seed_fan_culture.py", "scripts/analyze_futures_html.py",
    "scripts/crawl_2002_2009_stats.py",
