[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "kbo-playwright"
version = "1.0.0"
description = "Korean Baseball Organization (KBO) data collection system using Playwright"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "anomalyco"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
]

dependencies = [
    "playwright>=1.60",
    "beautifulsoup4>=4.12.3",
    "sqlalchemy>=2.0",
    "apscheduler>=3.10.4",
    "pydantic>=2.5.0",
]

[tool.setuptools.packages.find]
include = ["src*"]

[tool.ruff]
line-length = 120
target-version = "py312"
exclude = ["scripts/investigations/"]

[tool.ruff.lint]
select = [
    "E",       # pycodestyle errors
    "W",       # pycodestyle warnings
    "F",       # pyflakes
    "I",       # isort
    "UP",      # pyupgrade (Python 3.10+)
    "RET",     # flake8-return
    "ANN001",  # missing-type-function-argument
    "ANN002",  # missing-type-args
    "ANN003",  # missing-type-kwargs
    "ANN202",  # missing-return-type-private-function
    "ANN205",  # missing-return-type-static-method
    "ANN201",  # missing-return-type-public-function
    "ANN204",  # missing-return-type-special-method
    "ANN206",  # missing-return-type-class-method
    "ANN401",  # dynamically typed expressions (Any)
    "TC001",   # typing-only-first-party-import
    "TC002",   # typing-only-third-party-import
    "TC003",   # typing-only-standard-library-import
    "TRY003",  # raise-vanilla-args
    "TRY004",  # type-check-without-type-error
    "TRY201",  # verbose-raise
    "TRY301",  # raise-within-try
    "TRY300",  # try-consider-else
    "TRY400",  # error-instead-of-exception
    "TRY401",  # verbose-log-message
    "B",       # flake8-bugbear (limited)
    "SIM",     # flake8-simplify (limited)
    "G",       # logging (f-strings, format, exc_info)
    "BLE",     # flake8-blind-except
    "RUF100",  # unused noqa
    "RUF005",  # collection literal concatenation
    "RUF017",  # avoid-six
    "RUF022",  # unsorted-dunder-all
    "RUF015",  # unnecessary-iterable-allocation-for-first-element
    "RUF046",  # unnecessary-cast-to-int
    "RUF059",  # unused-unpacked-variable
    "EM101",   # raw-string-in-exception
    "PYI034",  # non-self-return-type
    "PERF401",  # manual list comprehension
    "PT",      # pytest style
    "PTH",     # pathlib (os.path 대체)
    "ARG",     # unused-function-argument
    "T20",     # print / pdb
    "FURB167", # regex-flag-alias
    "RUF013",  # implicit-optional
    "DTZ005",  # datetime-now-without-tz
    "S608",    # hardcoded-sql-expression
    "N",       # pep8-naming
    "FLY002",  # f-string instead of string join
    "RSE",     # redundant-exception (bare Exception)
    "PIE",     # flake8-pie (miscellaneous simplifications)
    "YTT",     # sys.version checks
    "SLF001",  # private-member-access (intentional internal access noqa'd)
    "PLR0913", # too-many-arguments
    "PLR0912", # too-many-branches
    "PLR0915", # too-many-statements
    "PLR0911", # too-many-return-statements
    "PLR5501", # if-stmt-min-max
    "ISC",     # implicit-string-concatenation
    "PGH",     # pygrep-hooks
    "FURB132", # for-loop-with-temporary-variable
    "RUF024",  # non-unique-dunder-all
    "RUF040",  # non-unique-dunder-slots
    "RUF012",  # mutable-class-default
    "PLW0603", # global-statement
    "PLW0127", # self-assigning-variable
    "S501",    # request-with-no-cert-validation
    "S311",    # suspicious-non-cryptographic-random-usage
    "S310",    # suspicious-url-open-usage
    "S603",    # subprocess-without-shell-equals-true
    "ASYNC109", # async-function-with-timeout
    "ASYNC212", # blocking-http-call-httpx-in-async-function
    "ASYNC240", # blocking-path-method-in-async-function
    "FURB110", # if-exp-instead-of-or-operator
    "RUF021",   # parenthesize-chained-operators
    "RUF019",   # unnecessary-key-check
]
ignore = [
    "E402",    # module-import-not-at-top (lazy imports intentional)
    "E501",    # line-too-long (handled by formatter)
    "E701",    # multiple-statements-on-one-line-colon (legacy style)
    "E702",    # multiple-statements-on-one-line-semicolon
    "E731",    # lambda assignment (permissive)
    "UP035",   # deprecated typing (Dict→dict etc — too many existing)
    "B023",    # function-uses-loop-variable (common closure pattern)
    "SIM102",  # collapsible-if (readability preference)
    "SIM108",  # simplify-if-else (ternary, not always clearer)
    "SIM113",  # enumerate-for-loop (manual counter ok)
    "COM812",  # handled by formatter (conflicts with ruff format)
    "G010",    # logging-warn vs logging-warning (redundant alias)
    "G004",    # logging-f-string (f-strings in logging intentional post print→logger conversion)
    "G101",    # logging-extra-attr (extra kwargs pattern is intentional)
    "PLR0911", # too-many-return-statements (pragmatic ignore for existing baseline)
]

