"src/crawlers/game_mvp_crawler.py" = ["ASYNC212"]
"src/crawlers/game_detail_crawler.py" = ["ASYNC240"]
"src/crawlers/player_search_crawler.py" = ["ASYNC109"]
"src/crawlers/relay_crawler.py" = ["ASYNC109"]
"src/crawlers/schedule_crawler.py" = ["ASYNC109"]
"src/repositories/player_repository.py" = ["RUF012"]
"src/repositories/player_season_pitching_repository.py" = ["PLW0603"]
"src/repositories/safe_batting_repository.py" = ["PLW0603"]
"src/utils/team_mapping.py" = ["PLW0603"]
"src/utils/request_policy.py" = ["S311"]
"src/utils/throttle.py" = ["S311"]
"src/utils/alerting.py" = ["S310"]
"src/utils/compliance.py" = ["ASYNC240"]
"src/utils/lock.py" = ["PLW0127"]
"src/sources/relay/base.py" = ["PLW0127"]
"src/sources/relay/orchestrator.py" = ["PLW0127"]
"src/monitoring/sla_tracker.py" = ["PLW0127"]
"src/sync/runtime_hydrator.py" = ["RUF012"]
